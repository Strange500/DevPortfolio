<div class="relative h-screen w-screen bg-black overflow-hidden flex flex-col font-sans selection:bg-primary selection:text-black">
  <div class="crt-overlay"></div>
  <div class="scanline"></div>

  <header class="h-8 border-b border-primary/40 flex items-center justify-between px-4 bg-black z-10 shrink-0">
    <div class="flex items-center gap-4 text-[10px] font-bold tracking-widest uppercase">
      <span class="text-primary phosphor-glow">SYS_PORTFOLIO_V1.0.4</span>
      <span class="opacity-40 hidden sm:inline">LAST_LOGIN: 2023.10.27 14:22:01 UTC</span>
    </div>
    <div class="flex items-center gap-3 opacity-60 text-xs">
      <span>◉</span>
      <span>⚡</span>
      <span>◈</span>
      <span>⚙</span>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <app-sidebar class="h-full" [items]="sidebarItems"></app-sidebar>

    <main class="flex-1 flex flex-col p-6 overflow-y-auto relative bg-surface">
      <div class="max-w-5xl w-full mx-auto space-y-12">
        <section class="flex flex-col items-center py-8">
          <div class="text-primary/20 font-mono text-[10px] w-full mb-4">
            ┌────────────────────────────────────────────────────────────────────────────────────────────┐
          </div>
          <pre class="ascii-art text-[6px] md:text-[8px] lg:text-[10px] text-primary phosphor-glow">{{ asciiLogo }}</pre>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
          <app-status-table class="md:col-span-8" [services]="services"></app-status-table>
          <app-metrics-panel class="md:col-span-4" [metrics]="metrics"></app-metrics-panel>
        </div>

        <app-terminal-panel
          [history]="history()"
          [command]="command()"
          (commandChange)="command.set($event)"
          (commandSubmit)="handleCommand($event)"
        ></app-terminal-panel>
      </div>
    </main>
  </div>

  <app-footer-bar [keys]="footerKeys" [time]="time()"></app-footer-bar>
</div>
