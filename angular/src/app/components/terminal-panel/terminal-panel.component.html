<div class="mt-8 space-y-1 font-mono text-xs">
  <div class="text-primary/20 text-[10px]">
    └────────────────────────────────────────────────────────────────────────────────────────────┘
  </div>

  @for (line of history(); track $index) {
    <div [ngClass]="line.startsWith('guest') ? 'text-primary font-bold' : 'text-white/80'">
      {{ line }}
    </div>
  }

  <form (submit)="onSubmit($event)" class="flex items-center gap-2 pt-2">
    <span class="text-primary font-bold">guest&#64;portfolio:~ $</span>
    <input
      type="text"
      [ngModel]="command()"
      (ngModelChange)="commandChange.emit($event)"
      name="command"
      class="flex-1 bg-transparent border-none outline-none text-white caret-primary"
      autofocus
    />
    <div class="w-2 h-4 bg-primary blink"></div>
  </form>
</div>
