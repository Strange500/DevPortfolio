<nav class="w-48 h-full border-r border-primary/40 flex flex-col p-3 gap-1 bg-black z-10 shrink-0">
  <div class="mb-6">
    <div class="text-[10px] font-bold uppercase tracking-tighter opacity-80">DIRECTORY_TREE</div>
    <div class="text-[8px] opacity-40 font-mono">vfs://usr/local/bin</div>
  </div>

  @for (item of items(); track item.label) {
    @if (item.route) {
      <a
        class="flex items-center gap-2 h-7 px-2 transition-all duration-75 text-primary hover:bg-primary/10"
        [routerLink]="item.route"
        routerLinkActive="bg-primary text-black font-bold"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
      >
        <span class="text-xs">{{ item.icon }}</span>
        <span class="text-[10px] uppercase tracking-tight">{{ item.label }}</span>
      </a>
    } @else {
      <div class="flex items-center gap-2 h-7 px-2 text-primary/60 cursor-not-allowed">
        <span class="text-xs">{{ item.icon }}</span>
        <span class="text-[10px] uppercase tracking-tight">{{ item.label }}</span>
      </div>
    }
  }

  <div class="mt-auto pt-4 border-t border-primary/10">
    <div class="text-[9px] opacity-40 leading-relaxed uppercase font-mono">
      CPU_LOAD: 12.4%<br />
      MEM_USAGE: 442MB<br />
      UPLINK: ACTIVE
    </div>
  </div>
</nav>
