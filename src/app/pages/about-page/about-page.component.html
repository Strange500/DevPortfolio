<section class="space-y-8 py-4">
  <header class="terminal-border bg-surface-container-low p-5">
    <p class="text-[10px] font-mono uppercase tracking-[0.2em] opacity-70">PROFILE/INTRODUCTION</p>
    <h1 class="text-2xl md:text-3xl font-bold tracking-tight phosphor-glow mt-2">About Me</h1>
    <p class="text-sm text-primary/70 mt-3 max-w-3xl">{{ introduction }}</p>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <article class="lg:col-span-4 terminal-border bg-surface-container p-5">
      <h2 class="text-sm uppercase tracking-[0.14em] font-semibold mb-4">Identity</h2>

      <div class="terminal-border bg-surface-container-highest p-3 inline-flex">
        <img
          ngSrc="/profile-photo.svg"
          alt="Portrait of Benjamin Roget"
          width="320"
          height="320"
          class="h-52 w-52 md:h-64 md:w-64 object-cover"
          priority
        />
      </div>

      <div class="mt-4 space-y-1">
        <p class="text-lg font-bold tracking-wide">{{ name }}</p>
        <p class="text-sm text-primary/70 uppercase tracking-wide">{{ role }}</p>
      </div>
    </article>

    <article class="lg:col-span-8 terminal-border bg-surface-container p-5">
      <h2 class="text-sm uppercase tracking-[0.14em] font-semibold mb-4">General Info</h2>

      <div class="space-y-3">
        @for (item of generalInfo; track item.label) {
          <div class="terminal-border bg-surface-container-high/40 px-3 py-2">
            <p class="text-[10px] uppercase tracking-[0.2em] text-primary/55">{{ item.label }}</p>
            <p class="text-sm text-primary/85 mt-1">{{ item.value }}</p>
          </div>
        }
      </div>

      <div class="mt-6 terminal-border px-4 py-3" [class.offer-open]="lookingForOffers" [class.offer-closed]="!lookingForOffers">
        <p class="text-[10px] uppercase tracking-[0.2em]">Offer Status</p>
        <p class="text-sm mt-1 font-semibold uppercase tracking-wide">
          {{ lookingForOffers ? 'Open to opportunities' : 'Not looking for offers currently' }}
        </p>
      </div>
    </article>
  </div>
</section>
